<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
  /* ── CSS VARIABLES ── */
  :root {
    --duck: #ffaa00;
    --heart: #ff4d8a;
    --ghost: #a855f7;
    --teal: #00d4aa;
    --bg: #0d0d0f;
    --surface: #18181b;
    --surface2: #222226;
    --border: rgba(255,255,255,.07);
    --text: #f4f4f5;
    --muted: #71717a;
    --gradient: linear-gradient(90deg,#ff8c2a,#ff4466,#ff4d8a,#d946ef,#9955ff,#3399ff,#44ddee);
    --pink: #ff4d8a;
    --purple: #a855f7;
    --charcoal: #f4f4f5;
    --gray: #a1a1aa;
    --quizborder: rgba(255,255,255,.1);
    --light: #1c1c1f;
    --red: #f87171;
  }

  /* ── GLOBAL ── */
  * {
    box-sizing: border-box;
  }

  html {
    overflow-x: hidden;
    max-width: 100vw;
    width: 100%;
  }

  body {
    overflow-x: hidden;
    max-width: 100vw;
    width: 100%;
    position: relative;
  }

  .page-wrapper,
  .main-wrapper,
  main,
  .w-layout-blockcontainer,
  .container {
    max-width: 100vw;
    overflow: hidden;
  }

  /* ── STICKY HEADER ── */
  .sticky-header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    width: 100%;
    height: 7vh;
    max-height: 60px;
    z-index: 1000;
    background-color: #000000;
    display: flex !important;
    align-items: center !important;
    justify-content: space-between !important;
    padding: 0 16px !important;
  }

  .sticky-header .logo {
    display: block !important;
    height: 24px !important;
    width: auto !important;
  }

  .sticky-header .w-embed {
    position: absolute !important;
    left: 50% !important;
    top: 55% !important;
    transform: translate(-50%, -50%) !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    pointer-events: auto !important;
    z-index: 1001 !important;
  }

  .sticky-header svg {
    width: 24px !important;
    height: 24px !important;
    display: block !important;
  }

  .sticky-header .menu-button {
    display: flex !important;
    flex-direction: column !important;
    gap: 5px !important;
    cursor: pointer !important;
  }

  .sticky-header .menu-button span {
    width: 24px !important;
    height: 2px !important;
    background: #888 !important;
    display: block !important;
  }

  .sticky-header > *:not(svg):not(.w-embed) {
    display: none !important;
  }

  /* ── STICKY FOOTER ── */
  .sticky-footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    width: 100%;
    height: 10vh;
    max-height: 80px;
    z-index: 1000;
  }

  /* ── PRODUCT LIST ── */
  .product-list-wrapper {
    padding-top: 8vh;
    padding-bottom: 11vh;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .product-item {
    height: 80vh;
    min-height: 520px;
    margin-bottom: 1vh;
    width: 100%;
    display: flex;
    justify-content: center;
    padding: 0 8px;
  }

  /* ── PRODUCT CARDS ── */
  .product-card {
    height: 100%;
    width: 100%;
    border-radius: 20px;
  }

  .card-inner {
    position: relative;
    width: 100%;
    height: 100%;
  }

  .card-front {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border-radius: 20px;
    background: #ffffff;
    z-index: 2;
    opacity: 1;
    visibility: visible;
    transition: opacity 0.3s ease, visibility 0.3s ease;
  }

  .card-back {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border-radius: 20px;
    background: #1a1a1a;
    z-index: 1;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.3s ease, visibility 0.3s ease;
  }

  .product-card.flipped .card-front {
    opacity: 0;
    visibility: hidden;
    z-index: 1;
  }

  .product-card.flipped .card-back {
    opacity: 1;
    visibility: visible;
    z-index: 2;
  }

  /* ── GALLERY ── */
  .gallery-slides {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }

  .gallery-slides::-webkit-scrollbar {
    display: none;
  }

  /* ── ATTRIBUTE MODAL ── */
  .attribute-modal-overlay {
    align-items: center !important;
    justify-content: center !important;
    padding: 20px !important;
  }

  .attribute-modal {
    max-height: 70vh !important;
    margin: auto !important;
  }

  /* ── FILTER OVERLAY ── */
  .filter-overlay {
    display: none;
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    right: 0 !important;
    bottom: 0 !important;
    background: rgba(0, 0, 0, 0.9) !important;
    z-index: 9999 !important;
    overflow-y: auto !important;
    padding: 20px !important;
  }

  .filter-overlay.visible {
    display: block !important;
  }

  .filter-overlay:not(.visible) {
    display: none !important;
    visibility: hidden !important;
  }

  .filter-overlay *,
  .filter-chip,
  .filter-nav button,
  .filter-done-btn {
    pointer-events: auto !important;
    cursor: pointer !important;
  }

  .filter-panel {
    background: #1a1a1a !important;
    border-radius: 16px !important;
    padding: 20px !important;
    max-width: 400px !important;
    margin: 0 auto !important;
  }

  .filter-header {
    display: flex !important;
    justify-content: space-between !important;
    align-items: center !important;
    margin-bottom: 20px !important;
  }

  .filter-title {
    color: #fff !important;
    font-size: 18px !important;
    font-weight: 600 !important;
  }

  .filter-done-btn {
    background: #888 !important;
    color: #fff !important;
    border: none !important;
    padding: 8px 16px !important;
    border-radius: 20px !important;
  }

  .filter-step {
    display: none !important;
  }

  .filter-step.active {
    display: block !important;
  }

  .filter-question {
    color: #fff !important;
    font-size: 16px !important;
    margin-bottom: 16px !important;
  }

  .filter-options {
    display: flex !important;
    flex-wrap: wrap !important;
    gap: 8px !important;
    margin-bottom: 20px !important;
  }

  .filter-options.scrollable {
    max-height: 200px !important;
    overflow-y: auto !important;
  }

  .filter-chip {
    background: rgba(255, 255, 255, 0.1) !important;
    color: #fff !important;
    border: 1px solid rgba(255, 255, 255, 0.2) !important;
    padding: 8px 14px !important;
    border-radius: 20px !important;
    font-size: 13px !important;
  }

  .filter-chip.selected {
    background: #888 !important;
    border-color: #888 !important;
  }

  .filter-nav {
    display: flex !important;
    gap: 10px !important;
    justify-content: flex-end !important;
  }

  .filter-nav button {
    background: rgba(255, 255, 255, 0.1) !important;
    color: #fff !important;
    border: none !important;
    padding: 10px 20px !important;
    border-radius: 20px !important;
  }

  .filter-apply-btn {
    background: #888 !important;
  }

  .progress-dot {
    width: 8px !important;
    height: 8px !important;
    border-radius: 50% !important;
    background: rgba(255, 255, 255, 0.2) !important;
    display: none !important;
    margin: 0 4px 16px !important;
  }

  .filter-overlay.visible .progress-dot {
    display: inline-block !important;
  }

  .progress-dot.active,
  .progress-dot.completed {
    background: #888 !important;
  }

  .active-filters {
    display: flex !important;
    flex-wrap: wrap !important;
    gap: 6px !important;
    margin-top: 16px !important;
  }

  .active-filter-tag {
    background: rgba(255, 255, 255, 0.1) !important;
    color: #fff !important;
    padding: 4px 10px !important;
    border-radius: 12px !important;
    font-size: 11px !important;
  }

  .active-filter-tag .remove {
    margin-left: 6px !important;
    cursor: pointer !important;
  }

  #filterBtn {
    pointer-events: auto !important;
    z-index: 1001 !important;
    cursor: pointer !important;
  }

  /* ── GRID EMBED VISIBILITY ── */
  body > .grid-embed,
  .product-list-wrapper > .grid-embed,
  .grid-embed:not(.card-back .grid-embed) {
    display: none !important;
  }

  .card-back .grid-embed {
    display: grid !important;
  }

  /* ── QUIZ MODAL OVERLAY ── */
  .shell {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9999;
    width: 100%;
    max-width: 420px;
    max-height: 780px;
    margin: auto;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
    font-family: 'Outfit', sans-serif;
    color: var(--text);
  }

  .shell.dhg-open {
    display: flex;
  }

  body.dhg-modal-open {
    overflow: hidden;
  }

  #dhg-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9998;
    background: rgba(0,0,0,.85);
    backdrop-filter: blur(4px);
  }

  #dhg-backdrop.dhg-open {
    display: block;
  }

  /* ── QUIZ: RAINBOW BAR ── */
  .rainbow-bar {
    height: 5px;
    background: var(--gradient);
    flex-shrink: 0;
  }

  /* ── QUIZ: TOP BAR ── */
  .top-bar {
    background: #111113;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
  }
  .top-brand {
    font-size: .6rem;
    font-weight: 900;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: rgba(255,255,255,.3);
  }
  .top-dots { display: flex; gap: 5px; }
  .top-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--border);
    transition: background .3s;
  }
  .top-dot.active { background: var(--heart); }
  .top-dot.done { background: rgba(255,255,255,.2); }

  /* ── QUIZ: SCREENS ── */
  .screens {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: var(--bg);
  }

  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    padding: 28px 24px 24px;
    transform: translateX(100%);
    opacity: 0;
    transition: transform .45s cubic-bezier(.4,0,.2,1), opacity .45s ease;
  }
  .screen.active { transform: translateX(0); opacity: 1; }
  .screen.exited { transform: translateX(-100%); opacity: 0; }

  /* ── QUIZ: SCREEN 0 — WELCOME ── */
  #s0 { justify-content: center; align-items: center; text-align: center; gap: 0; }

  .console-wrap { position: relative; margin-bottom: 28px; }
  .console {
    width: 180px; height: 120px;
    background: linear-gradient(160deg, #2a2a2f 0%, #1a1a1e 100%);
    border-radius: 24px; position: relative; margin: 0 auto;
    box-shadow: 0 0 0 2px rgba(255,255,255,.06), 0 20px 60px rgba(0,0,0,.8), inset 0 1px 0 rgba(255,255,255,.1);
  }
  .console-screen {
    position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
    width: 80px; height: 56px; background: #0a0a0c; border-radius: 6px;
    border: 2px solid rgba(255,255,255,.1); overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .console-screen-glow { position: absolute; inset: 0; background: var(--gradient); opacity: .15; }
  .console-screen-content { font-size: 1.4rem; position: relative; z-index: 1; animation: screen-cycle 3s ease-in-out infinite; }
  @keyframes screen-cycle {
    0%,25% { content: ''; } 0% { opacity: 1; } 20% { opacity: 1; transform: scale(1); }
    25% { opacity: 0; transform: scale(1.3); } 30% { opacity: 0; }
    50% { opacity: 1; transform: scale(1); } 70% { opacity: 1; transform: scale(1); }
    75% { opacity: 0; transform: scale(1.3); } 100% { opacity: 1; transform: scale(1); }
  }
  .console-dpad { position: absolute; left: 14px; bottom: 18px; width: 36px; height: 36px; }
  .dpad-h, .dpad-v { position: absolute; background: #333338; border-radius: 2px; }
  .dpad-h { width: 36px; height: 12px; top: 12px; left: 0; }
  .dpad-v { width: 12px; height: 36px; top: 0; left: 12px; }
  .console-btns { position: absolute; right: 14px; bottom: 18px; width: 44px; height: 36px; }
  .cbtn { position: absolute; width: 13px; height: 13px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .45rem; font-weight: 900; }
  .cbtn-duck { background: var(--duck); top: 11px; left: 0; }
  .cbtn-heart { background: var(--heart); top: 0; left: 15px; }
  .cbtn-ghost { background: var(--ghost); top: 11px; right: 0; }
  .console-glow { position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); width: 120px; height: 30px; background: radial-gradient(ellipse, rgba(168,85,247,.4) 0%, transparent 70%); filter: blur(8px); }

  .s0-title { font-size: 2rem; font-weight: 900; letter-spacing: -.04em; line-height: 1; margin-bottom: 10px; }
  .s0-title .grd { background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .s0-sub { font-size: .82rem; color: var(--muted); line-height: 1.6; margin-bottom: 28px; max-width: 300px; }
  .s0-tap { font-family: 'Space Mono', monospace; font-size: .62rem; color: var(--muted); letter-spacing: .1em; animation: blink 1.4s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── QUIZ: SCREEN 1 — THE MECHANIC ── */
  #s1 { gap: 0; }
  .s1-label { font-family: 'Space Mono', monospace; font-size: .58rem; letter-spacing: .16em; text-transform: uppercase; color: var(--teal); margin-bottom: 10px; }
  .s1-title { font-size: 1.4rem; font-weight: 900; letter-spacing: -.03em; line-height: 1.1; margin-bottom: 6px; }
  .s1-sub { font-size: .78rem; color: var(--muted); line-height: 1.5; margin-bottom: 16px; }
  .mechanic-demo { display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .mech-row {
    display: flex; align-items: center; gap: 12px; padding: 11px 14px;
    background: var(--surface); border-radius: 14px; border: 1.5px solid var(--border);
    position: relative; overflow: hidden; cursor: default;
    transition: transform .2s, border-color .2s, box-shadow .2s;
    animation: row-in .5s cubic-bezier(.17,.67,.35,1.5) both;
  }
  .mech-row::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 3px 0 0 3px; }
  .mech-row.duck::before { background: var(--duck); }
  .mech-row.heart::before { background: var(--heart); }
  .mech-row.ghost::before { background: var(--ghost); }
  .mech-row:hover { transform: translateX(4px); }
  .mech-row.duck:hover { border-color: rgba(255,170,0,.3); box-shadow: 0 0 20px rgba(255,170,0,.1); }
  .mech-row.heart:hover { border-color: rgba(255,77,138,.3); box-shadow: 0 0 20px rgba(255,77,138,.1); }
  .mech-row.ghost:hover { border-color: rgba(168,85,247,.3); box-shadow: 0 0 20px rgba(168,85,247,.1); }
  .mech-row:nth-child(1) { animation-delay: .1s; }
  .mech-row:nth-child(2) { animation-delay: .22s; }
  .mech-row:nth-child(3) { animation-delay: .34s; }
  @keyframes row-in { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
  .mech-emoji { font-size: 1.6rem; flex-shrink: 0; }
  .mech-text { flex: 1; }
  .mech-name { font-size: .68rem; font-weight: 900; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 1px; }
  .mech-row.duck .mech-name { color: var(--duck); }
  .mech-row.heart .mech-name { color: var(--heart); }
  .mech-row.ghost .mech-name { color: var(--ghost); }
  .mech-desc { font-size: .72rem; color: var(--muted); line-height: 1.3; }

  /* ── QUIZ: SCREEN 2 — THE RABBIT HOLE ── */
  #s2 { gap: 0; }
  .s2-label { font-family: 'Space Mono', monospace; font-size: .58rem; letter-spacing: .16em; text-transform: uppercase; color: var(--ghost); margin-bottom: 10px; }
  .s2-title { font-size: 1.4rem; font-weight: 900; letter-spacing: -.03em; line-height: 1.1; margin-bottom: 6px; }
  .s2-sub { font-size: .76rem; color: var(--muted); line-height: 1.5; margin-bottom: 16px; }
  .hole-trail { flex: 1; display: flex; flex-direction: column; gap: 0; position: relative; }
  .trail-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: var(--surface); border-radius: 10px; border: 1px solid var(--border); position: relative; animation: trail-in .4s ease both; }
  .trail-item:nth-child(1) { animation-delay: .05s; }
  .trail-item:nth-child(2) { animation-delay: .15s; }
  .trail-item:nth-child(3) { animation-delay: .25s; }
  .trail-item:nth-child(4) { animation-delay: .35s; }
  @keyframes trail-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .trail-icon { font-size: 1rem; width: 24px; text-align: center; flex-shrink: 0; }
  .trail-text { flex: 1; }
  .trail-type { font-size: .5rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 1px; }
  .trail-name { font-size: .75rem; font-weight: 700; color: var(--text); }
  .trail-tap { font-size: .58rem; color: var(--ghost); font-weight: 600; white-space: nowrap; }
  .trail-lost { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: rgba(168,85,247,.08); border: 1px dashed rgba(168,85,247,.3); border-radius: 10px; animation: trail-in .4s ease .45s both; }
  .trail-lost-text { font-size: .7rem; color: rgba(168,85,247,.8); font-style: italic; line-height: 1.3; }

  /* ── QUIZ: QUIZ SCREEN ── */
  #s-quiz { padding: 0; flex: 1; overflow-y: auto; transform: translateX(100%); opacity: 0; transition: transform .5s cubic-bezier(.4,0,.2,1), opacity .5s ease; }
  #s-quiz.active { transform: translateX(0); opacity: 1; }
  #s-quiz.exited { transform: translateX(-100%); opacity: 0; }
  #dhg-quiz-inner { width: 100%; height: 100%; background: var(--bg); padding: 20px 20px 16px; display: flex; flex-direction: column; min-height: 100%; }

  /* ── QUIZ: BOTTOM NAV ── */
  .bottom-nav { background: #111113; padding: 12px 20px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; border-top: 1px solid var(--border); }
  .nav-back { background: none; border: none; color: var(--muted); font-family: 'Outfit', sans-serif; font-size: .78rem; font-weight: 700; cursor: pointer; padding: 8px 0; display: flex; align-items: center; gap: 6px; transition: color .2s; }
  .nav-back:hover { color: var(--text); }
  .nav-back:disabled { opacity: 0; pointer-events: none; }
  .nav-next { padding: 11px 24px; border-radius: 14px; border: 0; background: var(--gradient); color: #fff; font-family: 'Outfit', sans-serif; font-weight: 900; font-size: .88rem; cursor: pointer; letter-spacing: -.01em; box-shadow: 0 4px 20px rgba(255,77,138,.3); transition: transform .15s, box-shadow .15s; display: flex; align-items: center; gap: 8px; }
  .nav-next:hover { transform: scale(1.03); box-shadow: 0 6px 28px rgba(255,77,138,.45); }
  .nav-next:active { transform: scale(.97); }
  .nav-steps { display: flex; gap: 5px; }
  .nav-step { width: 20px; height: 3px; border-radius: 2px; background: var(--border); transition: all .3s; }
  .nav-step.active { background: var(--heart); width: 28px; }
  .nav-step.done { background: rgba(255,255,255,.25); }

  /* ── QUIZ: PROGRESS BAR ── */
  .q-prog { margin-bottom: 16px; }
  .q-prog-track { height: 4px; background: rgba(255,255,255,.08); border-radius: 2px; overflow: hidden; margin-bottom: 6px; }
  .q-prog-fill { height: 100%; background: var(--gradient); border-radius: 2px; transition: width .5s cubic-bezier(.4,0,.2,1); }
  .q-prog-labels { display: flex; justify-content: space-between; }
  .q-prog-label { font-size: .6rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
  .q-prog-pct { font-size: .6rem; font-weight: 700; color: var(--pink); }

  /* ── QUIZ: QUESTIONS ── */
  .q-section { font-size: .56rem; font-weight: 700; text-transform: uppercase; letter-spacing: .14em; color: var(--muted); margin-bottom: 12px; }
  .q-emoji { font-size: 2rem; display: block; margin-bottom: 8px; }
  .q-text { font-size: 1.05rem; font-weight: 900; color: #f4f4f5; line-height: 1.3; margin-bottom: 4px; letter-spacing: -.02em; }
  .q-sub { font-size: .74rem; color: var(--muted); line-height: 1.5; margin-bottom: 20px; }

  /* ── QUIZ: TRIO BUTTONS ── */
  .trio { display: flex; gap: 7px; margin-bottom: 10px; }
  .trio-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px;
    padding: 14px 6px 12px; border-radius: 14px;
    border: 2px solid rgba(255,255,255,.08); background: var(--surface);
    cursor: pointer; font-family: 'Outfit', sans-serif;
    transition: all .2s cubic-bezier(.4,0,.2,1);
    position: relative; overflow: hidden;

<script defer src="https://cdn.jsdelivr.net/npm/@finsweet/attributes-cmsfilter@1/cmsfilter.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const personaIcons = {
    antiaging: 'https://cdn.prod.website-files.com/6759f0a54f1395fcb6c5b78e/692bb6172420eccbf003d94f_Persona-Professional-9S-Icon.png',
    family: 'https://cdn.prod.website-files.com/6759f0a54f1395fcb6c5b78e/692bb633b7dfc3c4a9930460_Persona-Family-9S-Icon.png',
    gentle: 'https://cdn.prod.website-files.com/6759f0a54f1395fcb6c5b78e/692bb624180b13d5ed06c2cb_Persona-Gentle-9S-Icon.png',
    inclusive: 'https://cdn.prod.website-files.com/6759f0a54f1395fcb6c5b78e/692bb61ec270b74752bedbf3_Persona-Inclusion-9S-Icon.png',
    genz: 'https://cdn.prod.website-files.com/6759f0a54f1395fcb6c5b78e/692bb2d59b2ada3aa2708d39_Persona-Gen-Z-Black-Icon.png',
    skeptic: 'https://cdn.prod.website-files.com/6759f0a54f1395fcb6c5b78e/692bb60b682f92c0edf1e806_Persona-Skeptic-9S-Icon.png'
  };

  document.querySelectorAll('.product-item').forEach(function(item) {
    const scores = [];
    ['antiaging', 'family', 'gentle', 'inclusive', 'genz', 'skeptic'].forEach(function(persona) {
      const el = item.querySelector('[fs-cmsfilter-field="' + persona + '"]');
      const score = el ? parseInt(el.textContent) || 0 : 0;
      scores.push({ persona: persona, score: score });
    });

    scores.sort((a, b) => b.score - a.score);
    const top3 = scores.slice(0, 3).filter(s => s.score > 0);

    const iconContainer = item.querySelector('.persona-icons');
    if (iconContainer && top3.length > 0) {
      iconContainer.innerHTML = top3.map(function(s) {
        return '<img src="' + personaIcons[s.persona] + '" alt="' + s.persona + '" style="width:35px;height:35px;">';
      }).join('');
    }
  });
});
</script>
