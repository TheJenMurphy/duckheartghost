<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --duck: #ffaa00;
  --heart: #ff4d8a;
  --ghost: #a855f7;
  --teal: #00d4aa;
  --bg: #0d0d0f;
  --surface: #18181b;
  --surface2: #222226;
  --border: rgba(255,255,255,.07);
  --text: #f4f4f5;
  --muted: #71717a;
  --gradient: linear-gradient(90deg,#ff8c2a,#ff4466,#ff4d8a,#d946ef,#9955ff,#3399ff,#44ddee);
  --pink:#ff4d8a; --purple:#a855f7;
  --gray:#a1a1aa;
  --quizborder:rgba(255,255,255,.1); --red:#f87171;
}

/* ── MODAL OVERLAY ── */
#dhg-modal-overlay {
  display: none;
  pointer-events: none;
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: rgba(0,0,0,.85);
  backdrop-filter: blur(4px);
  align-items: center;
  justify-content: center;
}
#dhg-modal-overlay.dhg-open {
  display: flex !important;
  pointer-events: all;
}

/* ── SHELL ── */
.shell {
  width: 100%;
  max-width: 420px;
  height: 100vh;
  max-height: 780px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  border-radius: 28px;
  box-shadow: 0 40px 120px rgba(0,0,0,.8);
}

.rainbow-bar { height: 5px; background: var(--gradient); flex-shrink: 0; }

.top-bar { background: #111113; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; border-bottom: 1px solid var(--border); }
.top-brand { font-size: .6rem; font-weight: 900; letter-spacing: .14em; text-transform: uppercase; color: rgba(255,255,255,.3); }
.top-dots { display: flex; gap: 5px; }
.top-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); transition: background .3s; }
.top-dot.active { background: var(--heart); }
.top-dot.done { background: rgba(255,255,255,.2); }

.screens { flex: 1; position: relative; overflow: hidden; background: var(--bg); }
.screen { position: absolute; inset: 0; display: flex; flex-direction: column; padding: 28px 24px 24px; transform: translateX(100%); opacity: 0; transition: transform .45s cubic-bezier(.4,0,.2,1), opacity .45s ease; }
.screen.active { transform: translateX(0); opacity: 1; }
.screen.exited { transform: translateX(-100%); opacity: 0; }

#s0 { justify-content: center; align-items: center; text-align: center; gap: 0; }
.console-wrap { position: relative; margin-bottom: 28px; }
.console { width: 180px; height: 120px; background: linear-gradient(160deg,#2a2a2f 0%,#1a1a1e 100%); border-radius: 24px; position: relative; margin: 0 auto; box-shadow: 0 0 0 2px rgba(255,255,255,.06), 0 20px 60px rgba(0,0,0,.8), inset 0 1px 0 rgba(255,255,255,.1); }
.console-screen { position: absolute; top: 14px; left: 50%; transform: translateX(-50%); width: 80px; height: 56px; background: #0a0a0c; border-radius: 6px; border: 2px solid rgba(255,255,255,.1); overflow: hidden; display: flex; align-items: center; justify-content: center; }
.console-screen-glow { position: absolute; inset: 0; background: var(--gradient); opacity: .15; }
.console-screen-content { font-size: 1.4rem; position: relative; z-index: 1; }
.console-dpad { position: absolute; left: 14px; bottom: 18px; width: 36px; height: 36px; }
.dpad-h, .dpad-v { position: absolute; background: #333338; border-radius: 2px; }
.dpad-h { width: 36px; height: 12px; top: 12px; left: 0; }
.dpad-v { width: 12px; height: 36px; top: 0; left: 12px; }
.console-btns { position: absolute; right: 14px; bottom: 18px; width: 44px; height: 36px; }
.cbtn { position: absolute; width: 13px; height: 13px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .45rem; font-weight: 900; }
.cbtn-duck { background: var(--duck); top: 11px; left: 0; }
.cbtn-heart { background: var(--heart); top: 0; left: 15px; }
.cbtn-ghost { background: var(--ghost); top: 11px; right: 0; }
.console-glow { position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); width: 120px; height: 30px; background: radial-gradient(ellipse,rgba(168,85,247,.4) 0%,transparent 70%); filter: blur(8px); }

.s0-title { font-size: 2rem; font-weight: 900; letter-spacing: -.04em; line-height: 1; margin-bottom: 10px; }
.s0-title .grd { background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.s0-sub { font-size: .82rem; color: var(--muted); line-height: 1.6; margin-bottom: 28px; max-width: 300px; }
.s0-tap { font-family: 'Space Mono',monospace; font-size: .62rem; color: var(--muted); letter-spacing: .1em; animation: blink 1.4s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

#s1 { gap: 0; }
.s1-label { font-family: 'Space Mono',monospace; font-size: .58rem; letter-spacing: .16em; text-transform: uppercase; color: var(--teal); margin-bottom: 10px; }
.s1-title { font-size: 1.4rem; font-weight: 900; letter-spacing: -.03em; line-height: 1.1; margin-bottom: 6px; }
.s1-sub { font-size: .78rem; color: var(--muted); line-height: 1.5; margin-bottom: 16px; }
.mechanic-demo { display: flex; flex-direction: column; gap: 8px; flex: 1; }
.mech-row { display: flex; align-items: center; gap: 12px; padding: 11px 14px; background: var(--surface); border-radius: 14px; border: 1.5px solid var(--border); position: relative; overflow: hidden; cursor: default; transition: transform .2s, border-color .2s, box-shadow .2s; animation: row-in .5s cubic-bezier(.17,.67,.35,1.5) both; }
.mech-row::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 3px 0 0 3px; }
.mech-row.duck::before { background: var(--duck); }
.mech-row.heart::before { background: var(--heart); }
.mech-row.ghost::before { background: var(--ghost); }
.mech-row:hover { transform: translateX(4px); }
.mech-row.duck:hover { border-color: rgba(255,170,0,.3); box-shadow: 0 0 20px rgba(255,170,0,.1); }
.mech-row.heart:hover { border-color: rgba(255,77,138,.3); box-shadow: 0 0 20px rgba(255,77,138,.1); }
.mech-row.ghost:hover { border-color: rgba(168,85,247,.3); box-shadow: 0 0 20px rgba(168,85,247,.1); }
.mech-row:nth-child(1){animation-delay:.1s} .mech-row:nth-child(2){animation-delay:.22s} .mech-row:nth-child(3){animation-delay:.34s}
@keyframes row-in { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
.mech-emoji { font-size: 1.6rem; flex-shrink: 0; }
.mech-text { flex: 1; }
.mech-name { font-size: .68rem; font-weight: 900; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 1px; }
.mech-row.duck .mech-name { color: var(--duck); }
.mech-row.heart .mech-name { color: var(--heart); }
.mech-row.ghost .mech-name { color: var(--ghost); }
.mech-desc { font-size: .72rem; color: var(--muted); line-height: 1.3; }

#s2 { gap: 0; }
.s2-label { font-family: 'Space Mono',monospace; font-size: .58rem; letter-spacing: .16em; text-transform: uppercase; color: var(--ghost); margin-bottom: 10px; }
.s2-title { font-size: 1.4rem; font-weight: 900; letter-spacing: -.03em; line-height: 1.1; margin-bottom: 6px; }
.s2-sub { font-size: .76rem; color: var(--muted); line-height: 1.5; margin-bottom: 16px; }
.hole-trail { flex: 1; display: flex; flex-direction: column; gap: 0; position: relative; }
.trail-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: var(--surface); border-radius: 10px; border: 1px solid var(--border); position: relative; animation: trail-in .4s ease both; }
.trail-item:nth-child(1){animation-delay:.05s} .trail-item:nth-child(2){animation-delay:.15s} .trail-item:nth-child(3){animation-delay:.25s} .trail-item:nth-child(4){animation-delay:.35s}
@keyframes trail-in { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.trail-icon { font-size: 1rem; width: 24px; text-align: center; flex-shrink: 0; }
.trail-text { flex: 1; }
.trail-type { font-size: .5rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 1px; }
.trail-name { font-size: .75rem; font-weight: 700; color: var(--text); }
.trail-tap { font-size: .58rem; color: var(--ghost); font-weight: 600; white-space: nowrap; }
.trail-lost { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: rgba(168,85,247,.08); border: 1px dashed rgba(168,85,247,.3); border-radius: 10px; animation: trail-in .4s ease .45s both; }
.trail-lost-text { font-size: .7rem; color: rgba(168,85,247,.8); font-style: italic; line-height: 1.3; }

#s-quiz { padding: 0; flex: 1; overflow-y: auto; transform: translateX(100%); opacity: 0; transition: transform .5s cubic-bezier(.4,0,.2,1), opacity .5s ease; }
#s-quiz.active { transform: translateX(0); opacity: 1; }
#s-quiz.exited { transform: translateX(-100%); opacity: 0; }
#dhg-quiz-inner { width: 100%; height: 100%; background: var(--bg); padding: 20px 20px 16px; display: flex; flex-direction: column; min-height: 100%; }

.bottom-nav { background: #111113; padding: 12px 20px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; border-top: 1px solid var(--border); }
.nav-back { background: none; border: none; color: var(--muted); font-family: 'Outfit',sans-serif; font-size: .78rem; font-weight: 700; cursor: pointer; padding: 8px 0; display: flex; align-items: center; gap: 6px; transition: color .2s; }
.nav-back:hover { color: var(--text); }
.nav-back:disabled { opacity: 0; pointer-events: none; }
.nav-next { padding: 11px 24px; border-radius: 14px; border: 0; background: var(--gradient); color: #fff; font-family: 'Outfit',sans-serif; font-weight: 900; font-size: .88rem; cursor: pointer; letter-spacing: -.01em; box-shadow: 0 4px 20px rgba(255,77,138,.3); transition: transform .15s, box-shadow .15s; display: flex; align-items: center; gap: 8px; }
.nav-next:hover { transform: scale(1.03); box-shadow: 0 6px 28px rgba(255,77,138,.45); }
.nav-next:active { transform: scale(.97); }
.nav-steps { display: flex; gap: 5px; }
.nav-step { width: 20px; height: 3px; border-radius: 2px; background: var(--border); transition: all .3s; }
.nav-step.active { background: var(--heart); width: 28px; }
.nav-step.done { background: rgba(255,255,255,.25); }

.q-prog { margin-bottom: 16px; }
.q-prog-track { height: 4px; background: rgba(255,255,255,.08); border-radius: 2px; overflow: hidden; margin-bottom: 6px; }
.q-prog-fill { height: 100%; background: var(--gradient); border-radius: 2px; transition: width .5s cubic-bezier(.4,0,.2,1); }
.q-prog-labels { display: flex; justify-content: space-between; }
.q-prog-label { font-size: .6rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
.q-prog-pct { font-size: .6rem; font-weight: 700; color: var(--pink); }
.q-section { font-size: .56rem; font-weight: 700; text-transform: uppercase; letter-spacing: .14em; color: var(--muted); margin-bottom: 12px; }
.q-emoji { font-size: 2rem; display: block; margin-bottom: 8px; }
.q-text { font-size: 1.05rem; font-weight: 900; color: #f4f4f5; line-height: 1.3; margin-bottom: 4px; letter-spacing: -.02em; }
.q-sub { font-size: .74rem; color: var(--muted); line-height: 1.5; margin-bottom: 20px; }
.trio { display: flex; gap: 7px; margin-bottom: 10px; }
.trio-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; padding: 14px 6px 12px; border-radius: 14px; border: 2px solid rgba(255,255,255,.08); background: var(--surface); cursor: pointer; font-family: 'Outfit',sans-serif; transition: all .2s cubic-bezier(.4,0,.2,1); position: relative; overflow: hidden; }
.trio-btn::before { content:''; position:absolute; inset:0; opacity:0; transition:opacity .2s; }
.trio-btn:hover { transform: translateY(-3px); }
.trio-btn:active { transform: translateY(0) scale(.97); }
.trio-btn.duck-btn:hover { border-color:rgba(255,170,0,.5); box-shadow:0 6px 20px rgba(255,170,0,.15); }
.trio-btn.duck-btn::before { background:linear-gradient(135deg,rgba(255,170,0,.08),rgba(255,170,0,.04)); }
.trio-btn.duck-btn:hover::before { opacity:1; }
.trio-btn.duck-btn.selected { border-color:var(--duck); background:rgba(255,170,0,.15); box-shadow:0 0 0 3px rgba(255,170,0,.2); }
.trio-btn.heart-btn:hover { border-color:rgba(255,77,138,.5); box-shadow:0 6px 20px rgba(255,77,138,.15); }
.trio-btn.heart-btn::before { background:linear-gradient(135deg,rgba(255,77,138,.08),rgba(255,77,138,.04)); }
.trio-btn.heart-btn:hover::before { opacity:1; }
.trio-btn.heart-btn.selected { border-color:var(--heart); background:rgba(255,77,138,.15); box-shadow:0 0 0 3px rgba(255,77,138,.2); }
.trio-btn.ghost-btn:hover { border-color:rgba(168,85,247,.5); box-shadow:0 6px 20px rgba(168,85,247,.15); }
.trio-btn.ghost-btn::before { background:linear-gradient(135deg,rgba(168,85,247,.08),rgba(168,85,247,.04)); }
.trio-btn.ghost-btn:hover::before { opacity:1; }
.trio-btn.ghost-btn.selected { border-color:var(--ghost); background:rgba(168,85,247,.15); box-shadow:0 0 0 3px rgba(168,85,247,.2); }
.t-icon { font-size:1.8rem; position:relative; z-index:1; transition:transform .2s; }
.trio-btn:hover .t-icon { transform:scale(1.15); }
.t-name { font-size:.64rem; font-weight:900; text-transform:uppercase; letter-spacing:.08em; position:relative; z-index:1; }
.trio-btn.duck-btn .t-name { color:var(--duck); }
.trio-btn.heart-btn .t-name { color:var(--heart); }
.trio-btn.ghost-btn .t-name { color:var(--ghost); }
.t-meaning { font-size:.58rem; color:var(--muted); font-weight:500; text-align:center; line-height:1.3; position:relative; z-index:1; }
.trio-btn.selected .t-meaning { color:rgba(255,255,255,.6); }
.ghost-confirm { background:rgba(168,85,247,.1); border:1.5px solid rgba(168,85,247,.4); border-radius:10px; padding:7px 12px; font-size:.73rem; font-weight:700; color:var(--ghost); text-align:center; margin-bottom:10px; display:none; }
.ghost-confirm.show { display:block; animation:popin .3s ease; }
@keyframes popin { from{opacity:0;transform:scale(.95)} to{opacity:1;transform:scale(1)} }

.result { display:flex; flex-direction:column; gap:12px; }
.r-hero { text-align:center; }
.r-icon { font-size:2.5rem; display:block; margin-bottom:6px; }
.r-eyebrow { font-size:.55rem; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-bottom:3px; }
.r-title { font-size:1.3rem; font-weight:900; letter-spacing:-.02em; color:#f4f4f5; }
.r-desc { font-size:.75rem; color:var(--muted); line-height:1.5; margin-top:5px; }
.r-div { height:1px; background:rgba(255,255,255,.08); border-radius:2px; }
.r-sec { display:flex; flex-direction:column; gap:5px; }
.r-sec-label { font-size:.56rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; }
.r-sec-label.seek { color:var(--teal); }
.r-sec-label.avoid { color:var(--red); }
.r-sec-label.explore { color:var(--purple); }
.r-tags { display:flex; flex-wrap:wrap; gap:4px; }
.rtag { font-size:.7rem; font-weight:600; padding:3px 9px; border-radius:9999px; border:1.5px solid; }
.rtag.seek { color:var(--teal); border-color:rgba(0,212,170,.3); background:rgba(0,212,170,.06); }
.rtag.avoid { color:var(--red); border-color:rgba(248,113,113,.3); background:rgba(248,113,113,.06); }
.rtag.explore { color:var(--purple); border-color:rgba(168,85,247,.3); background:rgba(168,85,247,.06); }
.dhg-summary { display:flex; gap:7px; background:var(--surface); border-radius:10px; padding:10px; border:1px solid var(--quizborder); }
.dhg-sum-col { flex:1; }
.dhg-sum-label { font-size:.55rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em; margin-bottom:4px; display:block; }
.dhg-sum-label.hearts { color:var(--heart); }
.dhg-sum-label.ghosts { color:var(--ghost); }
.dhg-sum-items { display:flex; flex-wrap:wrap; gap:3px; }
.dhg-sum-tag { font-size:.62rem; font-weight:600; padding:2px 6px; border-radius:9999px; }
.dhg-sum-tag.heart-tag { background:rgba(255,77,138,.1); color:var(--heart); border:1px solid rgba(255,77,138,.3); }
.dhg-sum-tag.ghost-tag { background:rgba(168,85,247,.1); color:var(--ghost); border:1px solid rgba(168,85,247,.3); }
.r-cta { width:100%; padding:12px; border-radius:14px; border:0; background:var(--gradient); color:#fff; font-family:'Outfit',sans-serif; font-weight:900; font-size:.9rem; cursor:pointer; box-shadow:0 4px 16px rgba(255,77,138,.3); transition:transform .15s; }
.r-cta:hover { transform:scale(1.01); }
.restart-btn { background:none; border:none; font-family:'Outfit',sans-serif; font-size:.7rem; color:var(--muted); cursor:pointer; text-decoration:underline; text-align:center; padding:2px; }

@keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
</style>
