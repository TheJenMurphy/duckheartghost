<div id="filterOverlay" class="filter-overlay">
<div class="filter-panel">
<div class="filter-header"><span class="filter-title">Find Your Product</span><button class="filter-done-btn" id="filterDoneBtn">Done</button></div>
<div class="filter-progress" id="progressDots"></div>
<div class="filter-step active" data-step="1"><div class="filter-question">What are you looking for?</div><div class="filter-options" id="typeOptions"></div><div class="filter-nav"><button class="filter-skip-btn">Skip</button><button class="filter-next-btn">Next</button></div></div>
<div class="filter-step" data-step="2"><div class="filter-question">What area?</div><div class="filter-options" id="categoryOptions"></div><div class="filter-nav"><button class="filter-back-btn">Back</button><button class="filter-skip-btn">Skip</button><button class="filter-next-btn">Next</button></div></div>
<div class="filter-step" data-step="3"><div class="filter-question">What type?</div><div class="filter-options scrollable" id="productTypeOptions"></div><div class="filter-nav"><button class="filter-back-btn">Back</button><button class="filter-skip-btn">Skip</button><button class="filter-next-btn">Next</button></div></div>
<div class="filter-step" data-step="4"><div class="filter-question">Single or set?</div><div class="filter-options" id="formatOptions"></div><div class="filter-nav"><button class="filter-back-btn">Back</button><button class="filter-skip-btn">Skip</button><button class="filter-next-btn">Next</button></div></div>
<div class="filter-step" data-step="5"><div class="filter-question">Your budget?</div><div class="filter-options" id="priceOptions"></div><div class="filter-nav"><button class="filter-back-btn">Back</button><button class="filter-skip-btn">Skip</button><button class="filter-next-btn">Next</button></div></div>
<div class="filter-step" data-step="6"><div class="filter-question">Favorite brands?</div><div class="filter-options scrollable" id="brandOptions"></div><div class="filter-nav"><button class="filter-back-btn">Back</button><button class="filter-skip-btn">Skip</button><button class="filter-apply-btn">Show Results</button></div></div>
<div class="active-filters" id="activeFilters"></div>
</div></div>
<script>
(function(){
const D={types:['makeup','skincare'],categories:['face','cheek','eye','lip','lash-brow','tools'],products:{'makeup-face':['Foundation','Concealer','Primer','Setting Powder','Setting Spray','Tinted Moisturizer','BB Cream','CC Cream'],'makeup-cheek':['Blush','Bronzer','Contour','Highlighter'],'makeup-eye':['Eyeshadow','Eyeliner','Eye Primer','Under-eye Concealer'],'makeup-lip':['Lipstick','Lip Gloss','Lip Balm','Lip Liner','Liquid Lipstick','Lip Oil','Lip Stain'],'makeup-lash-brow':['Mascara','Brow Pencil','Brow Gel','Brow Powder','Lash Primer','Brow Pomade','Lash Serum'],'makeup-tools':['Face Brushes','Eye Brushes','Lip Brushes','Beauty Sponges','Eyelash Curlers','Tweezers','Mirrors','Brush Cleaners'],'skincare-face':['Cleanser','Toner','Essence','Serum','Moisturizer','Face Oil','Sunscreen','Face Mask','Exfoliant','Face Mist','Night Cream','Day Cream','Spot Treatment','Peel','Sleeping Mask'],'skincare-cheek':['Cheek Treatment Balm','Targeted Redness Treatment'],'skincare-eye':['Eye Cream','Eye Serum','Eye Gel','Eye Mask/Patches','Eye Oil','Dark Circle Treatment','Depuffing Treatment'],'skincare-lip':['Lip Balm','Lip Mask','Lip Scrub','Lip Treatment','Lip Oil','Lip Serum'],'skincare-lash-brow':['Lash Serum','Brow Serum','Lash Conditioner','Brow Oil'],'skincare-tools':['Gua Sha','Jade Roller','Ice Roller','Cleansing Brush','Konjac Sponge','Microcurrent Device','LED Device','Facial Steamer','Dermaroller','Silicone Scrubber']},formats:[{v:'single',l:'Single Product'},{v:'set',l:'Set / Bundle'}],prices:[{v:'budget',l:'Budget',s:'Up to $20'},{v:'accessible',l:'Accessible',s:'$21-$50'},{v:'prestige',l:'Prestige',s:'$51-$100'},{v:'luxury',l:'Luxury',s:'$100+'}],brands:['LYS Beauty','MERIT','ILIA','Kosas','Tower 28','Rare Beauty','Saie','Westman Atelier']};
const S={step:1,type:null,cat:null,skipped:[],filters:{type:[],category:[],'product-type':[],format:[],price:[],brand:[]}};
const $=id=>document.getElementById(id),slug=s=>s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/-$/,'');
function chip(f,v,l,s){const b=document.createElement('button');b.className='filter-chip';b.dataset.filter=f;b.dataset.value=v;b.innerHTML=s?`<span>${l}</span><span class="chip-sub">${s}</span>`:l;b.onclick=()=>toggle(b);return b;}
function render(){$('progressDots').innerHTML=[1,2,3,4,5,6].map(i=>`<span class="progress-dot${i===S.step?' active':i<S.step?(S.skipped.includes(i)?' skipped':' completed'):''}" data-step="${i}"></span>`).join('');$('typeOptions').innerHTML='';D.types.forEach(t=>$('typeOptions').appendChild(chip('type',t,t.charAt(0).toUpperCase()+t.slice(1))));$('categoryOptions').innerHTML='';D.categories.forEach(c=>$('categoryOptions').appendChild(chip('category',c,c==='lash-brow'?'Lash + Brow':c.charAt(0).toUpperCase()+c.slice(1))));$('formatOptions').innerHTML='';D.formats.forEach(f=>$('formatOptions').appendChild(chip('format',f.v,f.l)));$('priceOptions').innerHTML='';D.prices.forEach(p=>$('priceOptions').appendChild(chip('price',p.v,p.l,p.s)));$('brandOptions').innerHTML='';D.brands.forEach(b=>$('brandOptions').appendChild(chip('brand',slug(b),b)));renderProducts();restoreSelections();}
function renderProducts(){const c=$('productTypeOptions');c.innerHTML='';let items=[];if(S.type&&S.cat){items=D.products[S.type+'-'+S.cat]||[];}else if(S.type){Object.keys(D.products).filter(k=>k.startsWith(S.type)).forEach(k=>items.push(...D.products[k]));}else if(S.cat){['makeup','skincare'].forEach(t=>{const k=t+'-'+S.cat;if(D.products[k])items.push(...D.products[k]);});}else{Object.values(D.products).forEach(a=>items.push(...a));}[...new Set(items)].forEach(p=>c.appendChild(chip('product-type',slug(p),p)));restoreSelections();}
function restoreSelections(){document.querySelectorAll('.filter-chip').forEach(b=>{const f=b.dataset.filter,v=b.dataset.value;b.classList.toggle('selected',S.filters[f]?.includes(v));});}
function toggle(b){const f=b.dataset.filter,v=b.dataset.value;if(f==='type'){if(S.type===v){S.type=null;S.filters.type=[];}else{S.type=v;S.filters.type=[v];}S.filters['product-type']=[];renderProducts();}else if(f==='category'){if(S.cat===v){S.cat=null;S.filters.category=[];}else{S.cat=v;S.filters.category=[v];}S.filters['product-type']=[];renderProducts();}else{const i=S.filters[f].indexOf(v);if(i>-1)S.filters[f].splice(i,1);else S.filters[f].push(v);}restoreSelections();updateTags();}
function updateTags(){const c=$('activeFilters');c.innerHTML='';Object.entries(S.filters).forEach(([f,vals])=>vals.forEach(v=>{const t=document.createElement('span');t.className='active-filter-tag';t.innerHTML=`${v.replace(/-/g,' ')} <span class="remove" data-f="${f}" data-v="${v}">×</span>`;c.appendChild(t);}));c.querySelectorAll('.remove').forEach(r=>r.onclick=()=>{const f=r.dataset.f,v=r.dataset.v;S.filters[f]=S.filters[f].filter(x=>x!==v);if(f==='type')S.type=null;if(f==='category')S.cat=null;renderProducts();restoreSelections();updateTags();});}
function goTo(n){S.step=n;document.querySelectorAll('.filter-step').forEach(s=>s.classList.toggle('active',+s.dataset.step===n));render();if(n===3)renderProducts();}
function apply(){$('filterOverlay').classList.remove('visible');document.body.style.overflow='';const items=document.querySelectorAll('.w-dyn-item');let vis=0;const hasF=Object.values(S.filters).some(a=>a.length);const toolsSel=S.filters.category.includes('tools');items.forEach(item=>{const el=item.querySelector('.product-name,[data-name],h3,h4,.card-title');const name=el?el.textContent.toLowerCase():'';const isTool=/brush|sponge|curler|tweezer|mirror|cleaner|roller|gua sha|device|steamer|derma|scrubber|bag|tote|gift card/.test(name);let show=true;if(!hasF){show=!isTool;}else{if(isTool&&!toolsSel)show=false;if(show)Object.entries(S.filters).forEach(([f,vals])=>{if(!vals.length)return;let m=false;if(f==='type')m=true;else if(f==='category'){const c=vals[0];if(c==='face')m=/foundation|concealer|primer|powder|spray|tint|bb |cc |cleanser|toner|serum|moisturizer|sunscreen|mask|exfoli|mist|cream|treatment|peel|essence/.test(name);else if(c==='cheek')m=/blush|bronzer|contour|highlight|cheek|redness/.test(name);else if(c==='eye')m=/eye|shadow|liner/.test(name);else if(c==='lip')m=/lip|gloss|balm/.test(name);else if(c==='lash-brow')m=/mascara|brow|lash/.test(name);else if(c==='tools')m=isTool;}else if(f==='product-type')vals.forEach(v=>{if(name.includes(v.replace(/-/g,' ')))m=true;});else if(f==='format'){const isSet=/set|bundle|kit|duo|trio|collection/.test(name);m=vals.includes('set')?isSet:!isSet;}else if(f==='price'){const pe=item.querySelector('[data-price],.price,.product-price');const p=pe?parseFloat((pe.textContent||'').replace(/[^0-9.]/g,''))||0:0;if(vals.includes('budget')&&p>0&&p<=20)m=true;else if(vals.includes('accessible')&&p>20&&p<=50)m=true;else if(vals.includes('prestige')&&p>50&&p<=100)m=true;else if(vals.includes('luxury')&&p>100)m=true;}else if(f==='brand')vals.forEach(v=>{if(name.includes(v.replace(/-/g,' ')))m=true;});if(!m)show=false;});}item.style.display=show?'':'none';if(show)vis++;});console.log(`Showing ${vis} of ${items.length}`);}
render();document.querySelectorAll('.filter-next-btn').forEach(b=>b.onclick=()=>S.step<6&&goTo(S.step+1));document.querySelectorAll('.filter-back-btn').forEach(b=>b.onclick=()=>S.step>1&&goTo(S.step-1));document.querySelectorAll('.filter-skip-btn').forEach(b=>b.onclick=()=>{S.skipped.push(S.step);S.step<6?goTo(S.step+1):apply();});$('filterDoneBtn').onclick=apply;document.querySelector('.filter-apply-btn').onclick=apply;$('filterOverlay').onclick=e=>{if(e.target===$('filterOverlay')){$('filterOverlay').classList.remove('visible');document.body.style.overflow='';}};const gear=$('filterToggle');if(gear)gear.onclick=()=>{$('filterOverlay').classList.add('visible');document.body.style.overflow='hidden';};
window.iHeartCleanFilter={open:()=>{$('filterOverlay').classList.add('visible');document.body.style.overflow='hidden';},close:()=>{$('filterOverlay').classList.remove('visible');document.body.style.overflow='';},apply,reset:()=>{S.type=null;S.cat=null;S.skipped=[];Object.keys(S.filters).forEach(k=>S.filters[k]=[]);goTo(1);updateTags();}};
})();
</script>
