<style>
.filter-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:9999;display:none;align-items:flex-start;justify-content:center;padding-top:60px;opacity:0;transition:opacity .3s}
.filter-overlay.visible{display:flex;opacity:1}
.filter-panel{background:#1a1a1a;border-radius:24px;width:92%;max-width:420px;max-height:85vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 25px 80px rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.08)}
.filter-header{display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid rgba(255,255,255,.08)}
.filter-title{color:#fff;font-size:18px;font-weight:600}
.filter-done-btn,.filter-back-btn,.filter-skip-btn{background:transparent;border:1px solid #555;color:#888;padding:8px 18px;border-radius:20px;font-size:14px;cursor:pointer;transition:all .2s}
.filter-done-btn:hover,.filter-back-btn:hover,.filter-skip-btn:hover{border-color:#fff;color:#fff}
.filter-progress{display:flex;justify-content:center;gap:8px;padding:16px}
.progress-dot{width:8px;height:8px;border-radius:50%;background:#333;transition:all .3s}
.progress-dot.active{background:linear-gradient(135deg,#ff6b6b,#feca57,#48dbfb,#ff9ff3,#54a0ff);width:24px;border-radius:4px}
.progress-dot.completed{background:#555}
.progress-dot.skipped{background:#444;opacity:.5}
.filter-step{display:none;flex-direction:column;padding:0 24px 24px;animation:fadeIn .3s}
.filter-step.active{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.filter-question{color:#fff;font-size:22px;font-weight:500;margin-bottom:20px;text-align:center}
.filter-options{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:24px}
.filter-options.scrollable{max-height:220px;overflow-y:auto;padding:4px}
.filter-chip{background:#2a2a2a;border:1px solid #3a3a3a;color:#bbb;padding:12px 22px;border-radius:25px;font-size:14px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:2px}
.filter-chip:hover{border-color:#666;color:#fff;background:#333}
.filter-chip.selected{background:linear-gradient(135deg,#ff6b6b,#feca57,#48dbfb);border-color:transparent;color:#000;font-weight:600}
.filter-nav{display:flex;gap:12px;justify-content:center}
.filter-next-btn,.filter-apply-btn,.filter-back-btn,.filter-skip-btn{padding:14px 32px;border-radius:25px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s}
.filter-next-btn,.filter-apply-btn{background:linear-gradient(135deg,#ff6b6b,#feca57,#48dbfb,#ff9ff3);border:none;color:#000}
.filter-next-btn:hover,.filter-apply-btn:hover{transform:scale(1.02);box-shadow:0 4px 20px rgba(255,107,107,.3)}
.filter-skip-btn{padding:14px 24px}
.active-filters{display:flex;flex-wrap:wrap;gap:8px;padding:16px 24px;border-top:1px solid rgba(255,255,255,.08)}
.active-filters:empty{display:none}
.active-filter-tag{background:#333;color:#fff;padding:6px 12px;border-radius:15px;font-size:12px;display:flex;align-items:center;gap:6px}
.active-filter-tag .remove{cursor:pointer;opacity:.6}
.active-filter-tag .remove:hover{opacity:1}
.chip-sub{font-size:11px;opacity:.7}
</style>
